<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Quicksand:wght@300..700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- Lexend -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
  <title>Director Login</title>

  <style>
    body {
      font-family: 'Quicksand';
      background-color: #f4f6f9;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-card {
      background: #ffffff;
      border-radius: 20px;
      padding-top: 38px;
      padding-right: 40px;
      padding-left: 40px;
      padding-bottom: 40px;
      width: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
      position: relative;
    }

    .logo {
      width: 110px;
      margin-bottom: 10px;
    }

    .brand-text {
      font-family: 'Lexend', sans-serif;
      font-size: 12px;
      font-weight: bold;
      color: #ff682d;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .title {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 15px;
      color: #777;
      margin-bottom: 25px;
      font-weight: 600;
    }

    .form-control {
      border-radius: 10px;
      font-size: 13px;
      padding: 5px 12px;
      border: 1.5px solid #dedede;
      transition: 0.2s;
      font-weight: 500;
    }

    .form-control:focus {
      border-color: #ff9b50;
      box-shadow: 0 0 0 2px rgba(255, 155, 80, 0.15);
    }

    .input-group-text {
      background: #fff;
      border-radius: 10px;
      border-left: none;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-login {
      background: linear-gradient(90deg, #ff682d, #ffa94d);
      border: none;
      border-radius: 10px;
      padding: 10px;
      font-weight: 700;
      color: white;
      transition: 0.2s;
    }

    .btn-login:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      color: white;
    }

    .link {
      font-size: 14px;
      margin-top: 15px;
    }

    .link a {
      color: #ff682d;
      font-weight: 600;
      text-decoration: none;
    }

    .link a:hover {
      text-decoration: underline;
    }

  </style>
</head>

<body>

  <div class="login-card">

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="alert alert-{{category}} alert-dismissible fade show">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <img src="https://shichidaindonesia.com/wp-content/uploads/2016/11/logo-small-200.jpg" class="logo">
    <div class="brand-text">Shichida Indonesia</div>

    <div class="title">Log In - Director</div>
    <div class="subtitle">Login to your director account</div>

    <form method="POST" action="/director_login">

      <div class="mb-3 text-start">
        <label style="font-weight: 500; font-size: 15px;" class="mb-1">Username</label>
        <input type="text" name="form_username" class="form-control" placeholder="Enter your username" required>
      </div>

      <div class="mb-4 text-start">
        <label style="font-weight: 500; font-size: 15px;" class="mb-1">Password</label>
        <div class="input-group">
          <input type="password" id="password" name="form_password" class="form-control" placeholder="Enter your password" required>
          <span class="input-group-text" id="togglePassword">
            <i class="bi bi-eye"></i>
          </span>
        </div>
      </div>

      <button type="submit" class="btn btn-login w-100">LOG IN</button>

      <div class="link">
        Don't have an account? <a href="/director_signup">Sign Up</a>
      </div>

    </form>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const togglePassword = document.querySelector("#togglePassword");
    const password = document.querySelector("#password");

    togglePassword.addEventListener("click", function () {
      const type = password.getAttribute("type") === "password" ? "text" : "password";
      password.setAttribute("type", type);

      this.querySelector("i").classList.toggle("bi-eye");
      this.querySelector("i").classList.toggle("bi-eye-slash");
    });
  </script>

</body>

</html>
