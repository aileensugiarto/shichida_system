<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Quicksand:wght@300..700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- Lexend -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">

  <title>Sign Up</title>

  <style>
    body {
      font-family: 'Quicksand';
      background-color: #f4f6f9;
      /* height: 100vh; */
      display: flex;
      justify-content: center;
      align-items: center;
      padding-top: 50px;
      padding-bottom: 50px;
    }

    .signup-card {
      background: #ffffff;
      border-radius: 20px;
      padding-top: 38px;
      padding-right: 40px;
      padding-left: 40px;
      padding-bottom: 40px;
      width: 400px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      text-align: center;
      position: relative;
    }

    .logo {
      width: 110px;
      margin-bottom: 10px;
    }

    .brand-text {
      font-family: 'Lexend', sans-serif;
      font-size: 12px;
      font-weight: bold;
      color: #ff682d;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .title {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 15px;
      color: #777;
      margin-bottom: 25px;
      font-weight: 600;
    }

    .form-control {
      border-radius: 10px;
      font-size: 13px;
      padding: 5px 12px;
      border: 1.5px solid #dedede;
      transition: 0.2s;
      font-weight: 500;
    }

    .form-control:focus {
      border-color: #ff9b50;
      box-shadow: 0 0 0 2px rgba(255, 155, 80, 0.15);
    }

    .form-select {
      border-radius: 10px;
      font-size: 13px;
      padding: 5px 12px;
      border: 1.5px solid #dedede;
      transition: 0.2s;
      font-weight: 500;
      color: #6c757d;
    }

    .form-select:valid {
      color: #212529;
    }

    .form-select:focus {
      border-color: #ff9b50;
      box-shadow: 0 0 0 2px rgba(255, 155, 80, 0.15);
    }

    .input-group-text {
      background: #fff;
      border-radius: 10px;
      border-left: none;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-login {
      background: linear-gradient(90deg, #ff682d, #ffa94d);
      border: none;
      border-radius: 10px;
      padding: 10px;
      font-weight: 700;
      color: white;
      transition: 0.2s;
    }

    .btn-login:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      color: white;
    }

    .link {
      font-size: 14px;
      margin-top: 15px;
    }

    .link a {
      color: #ff682d;
      font-weight: 600;
      text-decoration: none;
    }

    .link a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="signup-card">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <div class="alert alert-{{category}} alert-dismissible fade show">
      <div class="alert-body">
        {{ message }}
      </div>
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <img src="https://shichidaindonesia.com/wp-content/uploads/2016/11/logo-small-200.jpg" class="logo">
    <div class="brand-text">Shichida Indonesia</div>

    <div class="title">Sign Up - Admin</div>
    <div class="subtitle">Create your admin account</div>

    <form method="POST" action="/signup" class="needs-validation">
      <!-- Branch -->
      <div class="mb-3 text-start">
        <label style="font-weight: 500; font-size: 15px;" class="mb-1">Branch</label>
        <select name="form_id_branch" class="form-select" required>
          <option value="" disabled selected>Select a branch</option>
          {% for branch in data_branch %}
          <option value="{{branch[0]}}">
            {{branch[1]}}
          </option>
          {% endfor %}
        </select>
      </div>
      <!-- Name -->
      <div class="mb-3 text-start">
        <label style="font-weight: 500; font-size: 15px;" class="mb-1">Name</label>
        <input type="text" name="form_name" class="form-control" placeholder="Enter your name" required>
      </div>

      <!-- Username -->
      <div class="mb-3 text-start">
        <label style="font-weight: 500; font-size: 15px;" class="mb-1">Username</label>
        <input type="text" name="form_username" class="form-control" placeholder="Enter your username" required>
      </div>

      <!-- Password -->
      <div class="mb-4 text-start">
        <label style="font-weight: 500; font-size: 15px;" class="mb-1">Password</label>
        <div class="input-group">
          <input type="password" id="password" name="form_password" class="form-control"
            placeholder="Enter your password" required>
          <span class="input-group-text" id="togglePassword">
            <i class="bi bi-eye"></i>
          </span>
        </div>
      </div>

      <button type="submit" class="btn btn-login w-100">SIGN UP</button>

      <div class="link">
        Already haven an account? <a href="/login">Log In</a>
      </div>
    </form>
  </div>

  <script>
    const togglePassword = document.querySelector("#togglePassword");
    const password = document.querySelector("#password");

    togglePassword.addEventListener("click", function () {
      // Change input type
      const type = password.getAttribute("type") === "password" ? "text" : "password";
      password.setAttribute("type", type);

      // Toggle the icon
      this.querySelector("i").classList.toggle("bi-eye");
      this.querySelector("i").classList.toggle("bi-eye-slash");
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous">
  </script>
</body>

</html>
